
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Panel Supervisor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: pointer; border: none !important; padding: 2px 4px; border-radius: 4px; }
        .fc-header-toolbar { padding: 1rem; background: white; border-radius: 12px 12px 0 0; margin-bottom: 0 !important; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Supervisor</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-sm font-bold text-gray-500" id="top-user-display">Panel Gerencial</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-medium hover:underline text-sm border px-3 py-1 rounded">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-[#0b1c30] tracking-tight">Panel de <span class="text-[#004f89]">Supervisor</span></h1>
                <p class="text-gray-500 mt-2 font-medium">Control total de logística e usuarios</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openUserModal()" class="bg-[#004f89] text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-900 transition flex items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined">person_add</span>
                    Nuevo Proveedor
                </button>
                <button onclick="openBlockModal()" class="bg-amber-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-amber-700 transition flex items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined">block</span>
                    Bloquear Jornada
                </button>
                <div class="bg-gray-100 p-2.5 rounded-xl flex items-center gap-3 border border-gray-200">
                    <span class="text-sm font-bold text-gray-700" id="user-display">Supervisor</span>
                    <a href="#" onclick="logout(); return false;" class="text-red-600 font-bold hover:underline text-xs bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100">Cerrar Sesión</a>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden mb-6">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="font-bold text-gray-700">Visor de Calendario</h2>
                <select id="plantaFilter" class="p-2 border rounded-lg text-xs font-bold">
                    <option value="all">Todas las Plantas</option>
                    <option value="Barracas">Barracas</option>
                    <option value="Pibera">Pibera</option>
                </select>
            </div>
            <div id='calendar'></div>
        </div>
    </div>
</main>

<!-- Modal Nuevo Usuario -->
<div id="userModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="bg-[#004f89] p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Alta de Proveedor</h3>
            <button onclick="closeUserModal()" class="hover:bg-white/20 rounded-full p-1"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Nombre de Empresa</label>
                <input type="text" id="newNombre" class="w-full mt-1 border-gray-300 rounded-lg shadow-sm" placeholder="Ej: Barrier Solution S.A.">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">ID Proveedor (para OC)</label>
                <input type="text" id="newProvId" class="w-full mt-1 border-gray-300 rounded-lg shadow-sm" placeholder="Ej: 3936">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Username (Login)</label>
                <input type="text" id="newUser" class="w-full mt-1 border-gray-300 rounded-lg shadow-sm" placeholder="Ej: barrier">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Contraseña</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="newPass" class="flex-1 border-gray-300 rounded-lg font-mono shadow-sm">
                    <button onclick="generatePass()" class="bg-gray-200 p-2 rounded-lg hover:bg-gray-300 text-gray-700" title="Generar Clave"><span class="material-symbols-outlined">autorenew</span></button>
                </div>
            </div>
        </div>
        <div class="bg-gray-50 p-4 border-t flex justify-end gap-3">
            <button onclick="closeUserModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Cerrar</button>
            <button id="btnSaveUser" class="px-4 py-2 bg-[#004f89] text-white font-bold rounded-lg hover:bg-blue-900 transition shadow-sm">Crear Usuario</button>
        </div>
    </div>
</div>

<!-- Modal Bloquear Día -->
<div id="blockModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="bg-amber-600 p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Bloquear Fecha</h3>
            <button onclick="closeBlockModal()" class="hover:bg-white/20 rounded-full p-1"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Fecha a bloquear</label>
                <input type="date" id="blockDate" class="w-full mt-1 border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Motivo (Interno)</label>
                <select id="blockReason" class="w-full mt-1 border-gray-300 rounded-lg">
                    <option value="Inventario">Inventario</option>
                    <option value="Cierre de Mes">Cierre de Mes</option>
                    <option value="Feriado Interno">Feriado Interno</option>
                    <option value="Obras/Mantenimiento">Obras/Mantenimiento</option>
                </select>
            </div>
        </div>
        <div class="bg-gray-50 p-4 border-t flex justify-end gap-3">
            <button onclick="closeBlockModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Cerrar</button>
            <button id="btnSaveBlock" class="px-4 py-2 bg-amber-600 text-white font-bold rounded-lg hover:bg-amber-700 transition">Confirmar Bloqueo</button>
        </div>
    </div>
</div>

<!-- Modal de Detalles del Turno -->
<div id="eventModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <div class="bg-[#004f89] p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Detalles del Turno</h3>
            <button onclick="closeModal()" class="hover:bg-white/20 rounded-full p-1"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4" id="modalContent"></div>
        <div class="bg-gray-50 p-4 border-t flex justify-end gap-3">
            <button onclick="closeModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Cerrar</button>
            <button id="btnCancelarTurno" class="px-4 py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">cancel</span> Cancelar Turno
            </button>
        </div>
    </div>
</div>

<script>
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);

    function logout() {
        localStorage.removeItem('biosintex_session');
        window.location.href = 'login.html';
    }

    var calendar;
    var globalDB = {};

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek', locale: 'es',
            slotMinTime: '07:00:00', slotMaxTime: '14:00:00',
            hiddenDays: [0, 6], allDaySlot: false,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,dayGridMonth' },
            eventClick: (info) => showEventDetails(info.event)
        });
        calendar.render();

        window.closeModal = () => document.getElementById('eventModal').classList.add('hidden');
        window.openBlockModal = () => document.getElementById('blockModal').classList.remove('hidden');
        window.closeBlockModal = () => document.getElementById('blockModal').classList.add('hidden');
        window.openUserModal = () => document.getElementById('userModal').classList.remove('hidden');
        window.closeUserModal = () => document.getElementById('userModal').classList.add('hidden');

        window.generatePass = () => {
            const charset = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let retVal = "";
            for (let i = 0; i < 8; ++i) retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            document.getElementById('newPass').value = retVal;
        };

        document.getElementById('btnSaveUser').onclick = async () => {
            const data = {
                action: 'add_user',
                nombre: document.getElementById('newNombre').value,
                proveedor_id: document.getElementById('newProvId').value,
                username: document.getElementById('newUser').value,
                password: document.getElementById('newPass').value,
                rol: 'proveedor'
            };
            if(!data.username || !data.password || !data.proveedor_id) return alert("Complete todos los campos.");
            const btn = document.getElementById('btnSaveUser');
            btn.innerText = "Guardando..."; btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify(data) });
                if((await res.json()).success) { alert("¡Usuario creado!"); location.reload(); }
            } catch(e) { alert("Error: " + e.message); }
            finally { btn.innerText = "Crear Usuario"; btn.disabled = false; }
        };

        document.getElementById('btnSaveBlock').onclick = async () => {
            const data = { action: 'block_day', fecha: document.getElementById('blockDate').value, motivo: document.getElementById('blockReason').value };
            if(!data.fecha) return alert("Seleccione fecha.");
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify(data) });
                if((await res.json()).success) { alert("Día bloqueado."); location.reload(); }
            } catch(e) { alert(e.message); }
        };

        window.showEventDetails = (event) => {
            const p = event.extendedProps;
            const start = event.start;
            const supplierData = (globalDB.USUARIOS || []).find(u => String(u.proveedor_id).trim() === String(p.supplier_id).trim());
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <p class="text-xs text-blue-600 font-bold uppercase mb-1">Contacto del Proveedor</p>
                        <p class="text-sm font-semibold">📧 ${supplierData?.email || 'No cargado'}</p>
                        <p class="text-sm font-semibold">📞 ${supplierData?.telefono || 'No cargado'}</p>
                    </div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Proveedor</p><p class="font-semibold text-sm">${p.supplier}</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Planta</p><p class="font-semibold text-sm">${p.planta}</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">OC</p><p class="font-bold text-[#004f89] text-sm">${p.oc}</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Pallets</p><p class="font-bold text-sm text-gray-800">${p.pallets}</p></div>
                    <div class="col-span-2"><p class="text-xs text-gray-500 font-bold uppercase">Material</p><p class="text-xs text-gray-600">${p.articulo}</p></div>
                </div>`;
            
            document.getElementById('btnCancelarTurno').onclick = async () => {
                if(!confirm("¿Cancelar este turno?")) return;
                try {
                    const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel_shift', id: event.id }) });
                    if((await res.json()).success) { alert("Turno cancelado."); event.remove(); closeModal(); }
                } catch(e) { alert(e.message); }
            };
            document.getElementById('eventModal').classList.remove('hidden');
        };

        async function loadData() {
            const res = await fetch(CONFIG.API_URL + "?action=get_all");
            globalDB = await res.json();
            
            const events = (globalDB.TURNOS || []).filter(s => String(s.estado).toLowerCase().trim() !== 'cancelado').map(s => {
                const pCount = parseInt(s.pallets) || 1;
                const endHours = Math.ceil(pCount / 5);
                const startStr = `${s.fecha}T${s.hora}:00`;
                let endDate = new Date(startStr);
                endDate.setHours(endDate.getHours() + endHours);
                const pad = (n) => String(n).padStart(2,'0');
                const endStr = `${endDate.getFullYear()}-${pad(endDate.getMonth()+1)}-${pad(endDate.getDate())}T${pad(endDate.getHours())}:${pad(endDate.getMinutes())}:00`;
                const color = String(s.planta).includes('Barracas') ? '#004f89' : '#006e2d';
                return {
                    id: s.id, title: `OC: ${s.oc} (${pCount}p)`, start: startStr, end: endStr, backgroundColor: color, borderColor: 'transparent',
                    extendedProps: { supplier: s.nombre_proveedor, supplier_id: s.proveedor_id, planta: s.planta, oc: s.oc, articulo: s.articulo, pallets: pCount }
                };
            });

            const blocks = (globalDB.BLOQUEOS || []).map(b => ({
                title: 'BLOQUEADO: ' + b.motivo, start: b.fecha, allDay: true, backgroundColor: '#9ca3af', display: 'background'
            }));

            calendar.addEventSource(events);
            calendar.addEventSource(blocks);

            document.getElementById('plantaFilter').onchange = (e) => {
                const val = e.target.value;
                calendar.getEvents().forEach(ev => {
                    if (val === 'all' || ev.extendedProps.planta === val) ev.setProp('display', 'auto');
                    else if(ev.extendedProps.planta) ev.setProp('display', 'none');
                });
            };
        }
        loadData();
    });
</script>
</body>
</html>
