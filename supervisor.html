
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Panel Supervisor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: pointer; border: none !important; padding: 2px 4px; border-radius: 4px; }
        .fc-header-toolbar { padding: 1rem; background: white; border-radius: 12px 12px 0 0; margin-bottom: 0 !important; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Supervisor</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-sm font-bold text-gray-500" id="user-display">Panel Gerencial</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-medium hover:underline text-sm border px-3 py-1 rounded">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-extrabold text-[#0b1c30] tracking-tight">Panel de <span class="text-[#004f89]">Supervisor</span></h1>
                <p class="text-gray-500 mt-2 font-medium">Control total de logística y recepciones</p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <select id="plantaFilter" class="p-2.5 border border-gray-200 rounded-xl shadow-sm focus:border-[#004f89] text-sm font-bold bg-white">
                    <option value="all">Todas las Plantas</option>
                    <option value="Barracas">Planta Barracas</option>
                    <option value="Pibera">Planta Pibera</option>
                </select>
                <button onclick="openBlockModal()" class="bg-amber-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-amber-700 transition flex items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined">block</span>
                    Bloquear Jornada
                </button>
                <div class="bg-gray-100 p-2.5 rounded-xl flex items-center gap-3 border border-gray-200">
                    <span class="text-sm font-bold text-gray-700" id="user-display">Supervisor</span>
                    <a href="#" onclick="logout(); return false;" class="text-red-600 font-bold hover:underline text-xs bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100">Cerrar Sesión</a>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div id='calendar'></div>
        </div>
    </div>
</main>

<!-- Modal de Detalles del Turno -->
<div id="eventModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
        <div class="bg-[#004f89] p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Detalles del Turno</h3>
            <button onclick="closeModal()" class="hover:bg-white/20 rounded-full p-1"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4" id="modalContent">
            <!-- Cargado por JS -->
        </div>
        <div class="bg-gray-50 p-4 border-t flex justify-end gap-3">
            <button onclick="closeModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Cerrar</button>
            <button id="btnCancelarTurno" class="px-4 py-2 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">cancel</span>
                Cancelar Turno
            </button>
        </div>
    </div>
</div>

<!-- Modal Bloquear Día -->
<div id="blockModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
        <div class="bg-amber-600 p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Bloquear Fecha</h3>
            <button onclick="closeBlockModal()" class="hover:bg-white/20 rounded-full p-1"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Fecha a bloquear</label>
                <input type="date" id="blockDate" class="w-full mt-1 border-gray-300 rounded-lg">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase">Motivo (Interno)</label>
                <select id="blockReason" class="w-full mt-1 border-gray-300 rounded-lg">
                    <option value="Inventario">Inventario</option>
                    <option value="Cierre de Mes">Cierre de Mes</option>
                    <option value="Feriado Interno">Feriado Interno</option>
                    <option value="Obras/Mantenimiento">Obras/Mantenimiento</option>
                </select>
            </div>
        </div>
        <div class="bg-gray-50 p-4 border-t flex justify-end gap-3">
            <button onclick="closeBlockModal()" class="px-4 py-2 text-gray-600 font-bold hover:bg-gray-100 rounded-lg transition">Cerrar</button>
            <button id="btnSaveBlock" class="px-4 py-2 bg-amber-600 text-white font-bold rounded-lg hover:bg-amber-700 transition">Confirmar Bloqueo</button>
        </div>
    </div>
</div>

<script>
    // SESIÓN
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);
    if (currentUser.rol !== 'supervisor') window.location.href = 'proveedor.html';

    function logout() {
        localStorage.removeItem('biosintex_session');
        window.location.href = 'login.html';
    }

    var calendar;

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            slotMinTime: '07:00:00',
            slotMaxTime: '15:00:00',
            hiddenDays: [0, 6],
            allDaySlot: false,
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'timeGridWeek,dayGridMonth'
            },
            eventClick: function(info) {
                showEventDetails(info.event);
            }
        });
        calendar.render();

        window.closeModal = () => {
            document.getElementById('eventModal').classList.add('hidden');
        };

        window.openBlockModal = () => document.getElementById('blockModal').classList.remove('hidden');
        window.closeBlockModal = () => document.getElementById('blockModal').classList.add('hidden');

        document.getElementById('btnSaveBlock').onclick = async () => {
            const date = document.getElementById('blockDate').value;
            const motive = document.getElementById('blockReason').value;
            if(!date) return alert("Seleccione una fecha");
            
            const btn = document.getElementById('btnSaveBlock');
            btn.innerText = "Guardando..."; btn.disabled = true;

            try {
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'block_day', fecha: date, motivo: motive })
                });
                if((await res.json()).success) {
                    alert("Fecha bloqueada exitosamente");
                    closeBlockModal();
                }
            } catch(e) { alert("Error: " + e.message); }
            finally { btn.innerText = "Confirmar Bloqueo"; btn.disabled = false; }
        };

        window.showEventDetails = (event) => {
            const p = event.extendedProps;
            const start = event.start;
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Proveedor</p><p class="font-semibold">${p.supplier}</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Planta</p><p class="font-semibold">${p.planta}</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Fecha y Hora</p><p class="font-semibold">${start.toLocaleDateString()} - ${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} hs</p></div>
                    <div><p class="text-xs text-gray-500 font-bold uppercase">Orden de Compra</p><p class="font-bold text-[#004f89]">${p.oc}</p></div>
                    <div class="col-span-2"><p class="text-xs text-gray-500 font-bold uppercase">Material</p><p class="font-semibold">${p.articulo}</p></div>
                    <div class="col-span-2"><p class="text-xs text-gray-500 font-bold uppercase">Pallets</p><div class="bg-blue-50 p-2 rounded border border-blue-100 font-bold text-blue-800 text-lg">${p.pallets} Pallets</div></div>
                </div>
            `;

            const btn = document.getElementById('btnCancelarTurno');
            btn.onclick = async () => {
                if(!confirm(`¿Seguro que desea cancelar el turno de ${p.supplier}?\nEsta acción se reflejará en la planilla de Google automáticamente.`)) return;
                
                btn.disabled = true;
                btn.innerHTML = "Cancelando...";
                
                try {
                    const res = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'cancel_shift', id: event.id })
                    });
                    const r = await res.json();
                    if(r.success) {
                        event.remove();
                        closeModal();
                        alert("Turno cancelado exitosamente.");
                    } else throw new Error(r.error);
                } catch(e) {
                    alert("Error al cancelar: " + e.message);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-symbols-outlined text-sm">cancel</span> Cancelar Turno';
                }
            };

            document.getElementById('eventModal').classList.remove('hidden');
        };

        async function safeLoadShifts() {
            try {
                console.log("Intentando cargar desde:", CONFIG.API_URL);
                
                const res = await fetch(CONFIG.API_URL + "?action=get_all");
                if (!res.ok) throw new Error("Respuesta no ok: " + res.status);
                
                const db = await res.json();
                console.log("Datos recibidos. Pestañas disponibles:", Object.keys(db));
                
                // Buscar la pestaña TURNOS de forma muy permisiva (ignora espacios, mayúsculas)
                const sheetKey = Object.keys(db).find(k => k.trim().toLowerCase() === 'turnos');
                console.log("Pestaña TURNOS encontrada como:", sheetKey);
                if (!sheetKey) {
                    alert("Error: No se encontró la pestaña 'TURNOS'.\nPestañas disponibles: " + Object.keys(db).join(", "));
                    return;
                }
                
                const rows = db[sheetKey] || [];
                
                // Cargar Bloqueos como eventos grises
                const blockKey = Object.keys(db).find(k => k.trim().toLowerCase() === 'bloqueos');
                const blockEvents = (db[blockKey] || []).map((b, bIdx) => {
                    let bDate = new Date(b.fecha);
                    let bDateStr = isNaN(bDate) ? String(b.fecha).split('T')[0] : bDate.toISOString().split('T')[0];
                    return {
                        title: `BLOQUEADO: ${b.motivo || 'Motivo interno'}`,
                        start: bDateStr,
                        allDay: true,
                        backgroundColor: '#9ca3af',
                        display: 'background'
                    };
                });
                
                // Convierte cualquier hora de Google Sheets a HH:mm
                // Maneja formatos como: "7:00", "7:00:00", "7:00:00 a.m.", "07:00 AM"
                const fixTime = (t) => {
                    let raw = String(t).trim().toLowerCase();
                    let isPM = raw.includes('p.m.') || raw.includes('pm');
                    // Limpiar el sufijo AM/PM
                    raw = raw.replace('a.m.','').replace('p.m.','').replace('am','').replace('pm','').trim();
                    let parts = raw.split(':');
                    if (parts.length >= 2) {
                        let h = parseInt(parts[0]);
                        let m = parts[1].padStart(2, '0');
                        if (isPM && h < 12) h += 12;
                        if (!isPM && h === 12) h = 0;
                        return `${String(h).padStart(2,'0')}:${m}`;
                    }
                    return "08:00";
                };

                // Convierte cualquier fecha de Google Sheets a YYYY-MM-DD
                // Maneja: "9/6/2026" (D/M/YYYY), "2026-06-09", "09-06-2026", "2026/06/09", etc.
                const fixDate = (f) => {
                    let raw = String(f).trim().split('T')[0].split(' ')[0];
                    let sep = raw.includes('/') ? '/' : raw.includes('-') ? '-' : null;
                    if (!sep) return null;
                    let parts = raw.split(sep);
                    if (parts.length !== 3) return null;
                    let [a, b, c] = parts;
                    let year, month, day;
                    if (a.length === 4) { // YYYY-MM-DD o YYYY/MM/DD
                        year = a; month = b; day = c;
                    } else if (c.length === 4) { // D/M/YYYY o DD-MM-YYYY
                        year = c; month = b; day = a;
                    } else {
                        return null;
                    }
                    let result = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    // Verificar que sea una fecha válida
                    if (isNaN(new Date(result).getTime())) return null;
                    return result;
                };

                console.log(`Total filas en TURNOS: ${rows.length}`);

                const events = rows.map((s, idx) => {
                    // Log de cada fila para diagnosticar
                    console.log(`Fila ${idx}:`, {
                        fecha_raw: s.fecha,
                        hora_raw: s.hora,
                        estado: s.estado,
                        planta: s.planta,
                        oc: s.oc
                    });

                    if (!s.fecha || !s.hora) {
                        console.warn(`Fila ${idx} descartada: fecha u hora vacía`);
                        return null;
                    }
                    if (String(s.estado).toLowerCase() === 'cancelado') {
                        console.warn(`Fila ${idx} descartada: estado cancelado`);
                        return null;
                    }

                    let dateStr = fixDate(s.fecha);
                    console.log(`Fila ${idx} fecha parseada:`, dateStr);
                    if (!dateStr) {
                        console.warn(`Fila ${idx} descartada: no se pudo parsear la fecha "${s.fecha}"`);
                        return null;
                    }

                    let timeStr = fixTime(s.hora);
                    console.log(`Fila ${idx} hora parseada:`, timeStr);

                    const pCount = parseInt(s.pallets) || 1;
                    const endHours = Math.ceil(pCount / 5);
                    const color = String(s.planta).includes('Barracas') ? '#004f89' : '#006e2d';

                    let startStr = `${dateStr}T${timeStr}:00`;
                    
                    // Calcular fin del turno visualmente (1h por cada 5 pallets)
                    let endDate = new Date(startStr);
                    endDate.setHours(endDate.getHours() + endHours);
                    let endStr = endDate.toISOString().split('.')[0]; 

                    console.log(`Fila ${idx} start=${startStr}, end=${endStr}`);

                    if (isNaN(new Date(startStr).getTime())) {
                        console.warn(`Fila ${idx} descartada: startStr inválido "${startStr}"`);
                        return null;
                    }

                    return {
                        id: s.id || idx,
                        title: `OC: ${s.oc} - ${s.nombre_proveedor || 'S/N'}`,
                        start: startStr,
                        end: endStr,
                        backgroundColor: color,
                        borderColor: 'transparent',
                        extendedProps: {
                            supplier: s.nombre_proveedor || 'S/D',
                            planta: s.planta,
                            oc: s.oc,
                            articulo: s.articulo,
                            pallets: pCount
                        }
                    };
                }).filter(e => e !== null);

                console.log(`Eventos válidos para el calendario: ${events.length}`, events);

                calendar.addEventSource(events);
                calendar.addEventSource(blockEvents);

                if (events.length > 0) {
                    events.sort((a,b) => new Date(a.start) - new Date(b.start));
                    try {
                        calendar.gotoDate(new Date(events[0].start));
                    } catch(gotoErr) {
                        console.error("Error en gotoDate:", gotoErr);
                    }
                }

                document.getElementById('plantaFilter').onchange = (e) => {
                    const val = e.target.value;
                    calendar.getEvents().forEach(ev => {
                        if (val === 'all' || ev.extendedProps.planta === val) ev.setProp('display', 'auto');
                        else ev.setProp('display', 'none');
                    });
                };

            } catch (e) {
                console.error("Error técnico detallado:", e);
                alert("Error técnico: " + e.message + ". Revisa la consola (F12) para más detalles.");
            }
        }
        
        safeLoadShifts();
    });

</script>
</body>
</html>
