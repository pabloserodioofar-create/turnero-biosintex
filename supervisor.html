
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Panel Supervisor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: pointer; border: none !important; padding: 2px 4px; border-radius: 4px; }
        .tab-btn.active { border-bottom: 3px solid #004f89; color: #004f89; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Supervisor</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest" id="top-user-display">Panel General</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-bold hover:underline text-sm border px-3 py-1.5 rounded-lg bg-red-50 border-red-100 transition">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-[#0b1c30] tracking-tighter">Gestión <span class="text-[#004f89]">Logística</span></h1>
                <p class="text-gray-500 mt-1">Control de turnos y proveedores</p>
            </div>
            <div class="flex gap-2">
                <button onclick="switchTab('calendar-view')" id="btn-tab-cal" class="tab-btn active px-4 py-2 font-bold text-gray-500 transition uppercase text-xs">Calendario</button>
                <button onclick="switchTab('users-view')" id="btn-tab-users" class="tab-btn px-4 py-2 font-bold text-gray-500 transition uppercase text-xs">Proveedores</button>
            </div>
        </header>

        <!-- VISTA CALENDARIO -->
        <div id="calendar-view" class="space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="flex gap-4">
                    <select id="plantaFilter" class="p-2 border rounded-lg text-xs font-bold bg-gray-50">
                        <option value="all">Todas las Plantas</option>
                        <option value="Barracas">Barracas</option>
                        <option value="Pibera">Pibera</option>
                    </select>
                </div>
                <button onclick="openBlockModal()" class="bg-amber-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-amber-700 transition flex items-center gap-2 text-sm shadow-md">
                    <span class="material-symbols-outlined text-sm">block</span> Bloquear Jornada
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
                <div id='calendar'></div>
            </div>
        </div>

        <!-- VISTA PROVEEDORES -->
        <div id="users-view" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-700">Listado de Usuarios</h2>
                <button onclick="openUserModal()" class="bg-[#004f89] text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-900 transition flex items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined">person_add</span> Nuevo Proveedor
                </button>
            </div>
            <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b text-[10px] uppercase font-black text-gray-400">
                        <tr><th class="px-8 py-4">Proveedor / ID</th><th class="px-8 py-4">Usuario</th><th class="px-8 py-4">Contraseña</th><th class="px-8 py-4 text-center">Acciones</th></tr>
                    </thead>
                    <tbody id="user-list-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- MODALES -->
<div id="blockModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-in zoom-in duration-200">
        <div class="bg-amber-600 p-6 text-white flex justify-between items-center">
            <h3 class="text-xl font-bold">Bloquear Fecha</h3>
            <button onclick="closeBlockModal()" class="hover:bg-white/20 rounded-full p-2"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="p-8 space-y-5">
            <div><label class="block font-black text-gray-400 uppercase text-[10px] mb-1">Fecha</label><input type="date" id="blockDate" class="w-full border-gray-200 rounded-xl bg-gray-50 p-3"></div>
            <div><label class="block font-black text-gray-400 uppercase text-[10px] mb-1">Motivo</label><select id="blockReason" class="w-full border-gray-200 rounded-xl bg-gray-50 p-3"><option value="Inventario">Inventario</option><option value="Cierre de Mes">Cierre de Mes</option><option value="Mantenimiento">Mantenimiento</option></select></div>
        </div>
        <div class="bg-gray-50 p-6 border-t flex gap-3"><button onclick="closeBlockModal()" class="flex-1 px-4 py-2 text-gray-500 font-bold rounded-xl hover:bg-gray-200">Cerrar</button><button id="btnSaveBlock" class="flex-1 px-4 py-2 bg-amber-600 text-white font-bold rounded-xl shadow-lg">Confirmar</button></div>
    </div>
</div>

<div id="eventModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden anime-in zoom-in duration-200">
        <div class="bg-[#004f89] p-6 text-white flex justify-between items-center"><h3 class="text-xl font-bold">Detalles del Turno</h3><button onclick="closeModal()" class="hover:bg-white/20 rounded-full p-2"><span class="material-symbols-outlined">close</span></button></div>
        <div class="p-8 space-y-6" id="modalContent"></div>
        <div class="bg-gray-50 p-6 border-t flex gap-3"><button onclick="closeModal()" class="flex-1 px-4 py-2 text-gray-500 font-bold rounded-xl hover:bg-gray-200">Cerrar</button><button id="btnCancelarTurno" class="flex-1 px-4 py-2 bg-red-600 text-white font-bold rounded-xl">Cancelar Turno</button></div>
    </div>
</div>

<div id="userModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden anime-in zoom-in duration-200">
        <div class="bg-[#004f89] p-6 text-white flex justify-between items-center"><h3 class="text-xl font-bold">Nuevo Proveedor</h3><button onclick="closeUserModal()" class="hover:bg-white/20 rounded-full p-2"><span class="material-symbols-outlined">close</span></button></div>
        <div class="p-8 space-y-4">
            <div><label class="text-[10px] text-gray-400 font-black uppercase">Nombre</label><input type="text" id="newNombre" class="w-full mt-1 border-gray-200 rounded-lg p-2 bg-gray-50"></div>
            <div><label class="text-[10px] text-gray-400 font-black uppercase">ID Proveedor</label><input type="text" id="newProvId" class="w-full mt-1 border-gray-200 rounded-lg p-2 bg-gray-50"></div>
            <div><label class="text-[10px] text-gray-400 font-black uppercase">Usuario</label><input type="text" id="newUser" class="w-full mt-1 border-gray-200 rounded-lg p-2 bg-gray-50"></div>
            <div><label class="text-[10px] text-gray-400 font-black uppercase">Contraseña</label><div class="flex gap-2"><input type="text" id="newPass" class="flex-1 border-gray-200 rounded-lg p-2 font-mono"><button onclick="generatePass('newPass')" class="bg-blue-50 text-blue-600 p-2 rounded-lg border border-blue-100"><span class="material-symbols-outlined">autorenew</span></button></div></div>
        </div>
        <div class="bg-gray-50 p-6 border-t flex gap-3"><button onclick="closeUserModal()" class="flex-1 px-4 py-2 text-gray-500 font-bold hover:bg-gray-200 rounded-lg transition">Cancelar</button><button id="btnSaveUser" class="flex-1 px-4 py-2 bg-[#004f89] text-white font-bold rounded-lg shadow-lg">Crear</button></div>
    </div>
</div>

<script>
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);

    function logout() { localStorage.removeItem('biosintex_session'); window.location.href = 'login.html'; }

    var calendar;
    var globalDB = {};

    document.addEventListener('DOMContentLoaded', async function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'timeGridWeek', locale: 'es', slotMinTime: '07:00:00', slotMaxTime: '14:00:00',
            hiddenDays: [0, 6], allDaySlot: false,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,dayGridMonth' },
            eventClick: (info) => showEventDetails(info.event)
        });
        calendar.render();

        window.applyFilter = () => {
            const val = document.getElementById('plantaFilter').value;
            calendar.getEvents().forEach(ev => {
                // Si no tiene planta en extendedProps, es un BLOQUEO (siempre se muestra)
                if (!ev.extendedProps.planta) return ev.setProp('display', 'block');
                
                // Si es un TURNO, filtramos por planta
                const plantaEvent = String(ev.extendedProps.planta).toLowerCase();
                const plantaFiltro = String(val).toLowerCase();
                
                if (val === 'all' || plantaEvent.includes(plantaFiltro)) {
                    ev.setProp('display', 'auto');
                } else {
                    ev.setProp('display', 'none');
                }
            });
        };

        document.getElementById('plantaFilter').onchange = applyFilter;

        window.switchTab = (viewId) => {
            document.getElementById('calendar-view').classList.toggle('hidden', viewId !== 'calendar-view');
            document.getElementById('users-view').classList.toggle('hidden', viewId !== 'users-view');
            document.getElementById('btn-tab-cal').classList.toggle('active', viewId === 'calendar-view');
            document.getElementById('btn-tab-users').classList.toggle('active', viewId === 'users-view');
            if(viewId === 'users-view') renderUserList();
        };

        window.closeModal = () => document.getElementById('eventModal').classList.add('hidden');
        window.openBlockModal = () => document.getElementById('blockModal').classList.remove('hidden');
        window.closeBlockModal = () => document.getElementById('blockModal').classList.add('hidden');
        window.openUserModal = () => document.getElementById('userModal').classList.remove('hidden');
        window.closeUserModal = () => document.getElementById('userModal').classList.add('hidden');
        window.generatePass = (id) => {
            const charset = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let retVal = ""; for (let i = 0; i < 8; ++i) retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            if(id) document.getElementById(id).value = retVal;
            return retVal;
        };

        function renderUserList() {
            const users = (globalDB.usuarios || []).filter(u => u.rol !== 'supervisor');
            document.getElementById('user-list-body').innerHTML = users.map(u => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-8 py-4 font-bold text-gray-800">${u.nombre}<br><span class="text-[9px] text-gray-400">ID: ${u.proveedor_id}</span></td>
                    <td class="px-8 py-4 font-mono text-xs text-gray-500">${u.username}</td>
                    <td class="px-8 py-4"><div class="flex items-center gap-2"><input type="text" value="${u.password}" readonly class="text-xs bg-gray-100 px-2 py-1 rounded w-28"><button onclick="resetPassword('${u.username}')" class="text-blue-600"><span class="material-symbols-outlined text-sm">autorenew</span></button></div></td>
                    <td class="px-8 py-4 text-center cursor-pointer" onclick="alert('Email: ${u.email || "-"}\\nWhatsApp: ${u.telefono || "-"}')"><span class="material-symbols-outlined text-gray-300">contact_support</span></td>
                </tr>
            `).join('');
        }

        window.resetPassword = async (username) => {
            const newPass = generatePass();
            if(!confirm(`¿Reseteamos clave a: ${newPass}?`)) return;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'update_user_password', username: username, newPassword: newPass }) });
                if((await res.json()).success) { alert("¡Guardado!"); await loadData(); renderUserList(); }
            } catch(e) { alert(e.message); }
        };

        document.getElementById('btnSaveBlock').onclick = async () => {
            const dateVal = document.getElementById('blockDate').value;
            const motiveVal = document.getElementById('blockReason').value;
            if(!dateVal) return alert("Elegí fecha.");
            const btn = document.getElementById('btnSaveBlock'); btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'block_day', fecha: dateVal, motivo: motiveVal }) });
                if((await res.json()).success) { alert("Fecha bloqueada."); location.reload(); }
            } catch(e) { alert(e.message); } finally { btn.disabled = false; }
        };

        document.getElementById('btnSaveUser').onclick = async () => {
            const data = { action:'add_user', nombre:document.getElementById('newNombre').value, proveedor_id:document.getElementById('newProvId').value, username:document.getElementById('newUser').value, password:document.getElementById('newPass').value, rol:'proveedor' };
            if(!data.username || !data.password) return alert("Faltan datos.");
            try {
                const res = await fetch(CONFIG.API_URL, { method:'POST', body:JSON.stringify(data) });
                if((await res.json()).success) { alert("¡Creado!"); location.reload(); }
            } catch(e) { alert("Error de red."); }
        };

        window.showEventDetails = (event) => {
            const p = event.extendedProps;
            const supplierData = (globalDB.usuarios || []).find(u => String(u.proveedor_id).trim() === String(p.supplier_id).trim());
            document.getElementById('modalContent').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                        <p class="text-[9px] text-blue-600 font-black uppercase tracking-tighter">Contacto</p>
                        <p class="text-sm font-bold text-blue-900">${supplierData?.email || '-'}</p>
                        <p class="text-sm font-bold text-blue-900">${supplierData?.telefono || '-'}</p>
                    </div>
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Proveedor</p><p class="font-bold text-sm text-gray-800">${p.supplier}</p></div>
                    <div><p class="text-[10px] text-gray-400 font-bold uppercase">Planta</p><p class="font-bold text-sm text-gray-800">${p.planta}</p></div>
                    <div class="col-span-2 border-t pt-4 font-black text-[#004f89] uppercase text-xs">Orden de Compra: ${p.oc}</div>
                    <div class="col-span-2 text-xs text-gray-700 font-medium">${p.articulo}</div>
                    <div class="col-span-2 bg-gray-50 p-3 rounded-lg border flex justify-between items-center"><span class="text-xs font-bold text-gray-400">Pallets</span><span class="font-black text-lg text-gray-800">${p.pallets}</span></div>
                </div>`;
            document.getElementById('btnCancelarTurno').onclick = async () => {
                if(!confirm("¿Cancelar?")) return;
                try {
                    const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'cancel_shift', id: event.id }) });
                    if((await res.json()).success) { event.remove(); closeModal(); }
                } catch(e) { alert("Error."); }
            };
            document.getElementById('eventModal').classList.remove('hidden');
        };

        async function loadData() {
            const res = await fetch(CONFIG.API_URL + "?action=get_all");
            const rawDB = await res.json();
            
            globalDB = {};
            Object.keys(rawDB).forEach(k => { globalDB[k.trim().toLowerCase()] = rawDB[k]; });

            const events = (globalDB.turnos || []).filter(s => String(s.estado).toLowerCase().trim() !== 'cancelado').map(s => {
                const pCount = parseInt(s.pallets) || 1; const endHours = Math.ceil(pCount/5);
                const startStr = `${s.fecha}T${s.hora}:00`;
                let endDate = new Date(startStr); endDate.setHours(endDate.getHours() + endHours);
                const pad = (n) => String(n).padStart(2,'0');
                const endStr = `${endDate.getFullYear()}-${pad(endDate.getMonth()+1)}-${pad(endDate.getDate())}T${pad(endDate.getHours())}:${pad(endDate.getMinutes())}:00`;
                return { 
                    id: s.id, title: `OC: ${s.oc}`, start: startStr, end: endStr, 
                    backgroundColor: String(s.planta).toLowerCase().includes('barracas') ? '#004f89' : '#006e2d', 
                    borderColor:'transparent', 
                    extendedProps: { supplier:s.nombre_proveedor, supplier_id:s.proveedor_id, planta:s.planta, oc:s.oc, articulo:s.articulo, pallets:pCount } 
                };
            });

            const blocks = (globalDB.bloqueos || []).map(b => ({
                title: '🚫 DÍA BLOQUEADO: ' + b.motivo, start: b.fecha, allDay: true, 
                backgroundColor: '#ef4444', textColor: '#ffffff'
            }));

            calendar.removeAllEventSources();
            calendar.addEventSource(events);
            calendar.addEventSource(blocks);

            // IMPORTANTE: Aplicar el filtro inmediatamente después de cargar los datos
            setTimeout(applyFilter, 200);
            
            if(!document.getElementById('users-view').classList.contains('hidden')) renderUserList();
        }
        loadData();
    });
</script>
</body>
</html>
