
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Panel Supervisor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: pointer; border: none !important; padding: 2px 4px; border-radius: 4px; }
        .fc-header-toolbar { padding: 1rem; background: white; border-radius: 12px 12px 0 0; margin-bottom: 0 !important; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Supervisor</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-sm font-bold text-gray-500" id="user-display">Panel Gerencial</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-medium hover:underline text-sm border px-3 py-1 rounded">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-[#0b1c30] tracking-tighter">Calendario de Turnos</h1>
                <p class="text-gray-500 mt-1">Gestión Centralizada desde Google Sheets</p>
            </div>
            <div class="flex flex-wrap gap-3 items-center">
                <select id="plantaFilter" class="p-2 border rounded-md shadow-sm focus:border-[#004f89] text-sm font-medium bg-white">
                    <option value="all">Todas las Plantas</option>
                    <option value="Barracas">Planta Barracas</option>
                    <option value="Pibera">Planta Pibera</option>
                </select>
                <button onclick="calendar.today()" class="bg-white border p-2 rounded-md hover:bg-gray-50 text-sm font-bold">Hoy</button>
                <a href="https://docs.google.com/spreadsheets" target="_blank" class="bg-green-600 text-white px-4 py-2 rounded-md font-bold text-sm hover:bg-green-700 transition flex items-center gap-1 shadow-sm">
                    <span class="material-symbols-outlined text-sm">grid_on</span>
                    Abrir Excel
                </a>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
            <div id='calendar'></div>
        </div>
    </div>
</main>

<script>
    // SESIÓN
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);
    if (currentUser.rol !== 'supervisor') window.location.href = 'proveedor.html';

    function logout() {
        localStorage.removeItem('biosintex_session');
        window.location.href = 'login.html';
    }

    var calendar;

    document.addEventListener('DOMContentLoaded', async function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            slotMinTime: '07:00:00',
            slotMaxTime: '15:00:00',
            hiddenDays: [0, 6],
            allDaySlot: false,
            headerToolbar: {
                left: 'prev,next',
                center: 'title',
                right: 'timeGridWeek,dayGridMonth'
            },
            eventClick: function(info) {
                const p = info.event.extendedProps;
                alert(`Turno Detallado:\n\nProveedor: ${p.supplier}\nOC: ${p.oc}\nMaterial: ${p.articulo}\nPallets: ${p.pallets}\nPlanta: ${p.planta}\nHora: ${info.event.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} hs`);
            }
        });
        calendar.render();

        async function safeLoadShifts() {
            try {
                console.log("Intentando cargar desde:", CONFIG.API_URL);
                
                const res = await fetch(CONFIG.API_URL + "?action=get_all");
                if (!res.ok) throw new Error("Respuesta no ok: " + res.status);
                
                const db = await res.json();
                console.log("Datos:", db);
                
                const sheetKey = Object.keys(db).find(k => k.toLowerCase() === 'turnos');
                if (!sheetKey) {
                    alert("Error: No se encontró la pestaña 'TURNOS' en la planilla.");
                    return;
                }
                
                const rows = db[sheetKey] || [];
                
                // Convierte cualquier hora de Google Sheets a HH:mm
                // Maneja formatos como: "7:00", "7:00:00", "7:00:00 a.m.", "07:00 AM"
                const fixTime = (t) => {
                    let raw = String(t).trim().toLowerCase();
                    let isPM = raw.includes('p.m.') || raw.includes('pm');
                    // Limpiar el sufijo AM/PM
                    raw = raw.replace('a.m.','').replace('p.m.','').replace('am','').replace('pm','').trim();
                    let parts = raw.split(':');
                    if (parts.length >= 2) {
                        let h = parseInt(parts[0]);
                        let m = parts[1].padStart(2, '0');
                        if (isPM && h < 12) h += 12;
                        if (!isPM && h === 12) h = 0;
                        return `${String(h).padStart(2,'0')}:${m}`;
                    }
                    return "08:00";
                };

                // Convierte cualquier fecha de Google Sheets a YYYY-MM-DD
                // Maneja: "9/6/2026" (D/M/YYYY), "2026-06-09", "09-06-2026", "2026/06/09", etc.
                const fixDate = (f) => {
                    let raw = String(f).trim().split('T')[0].split(' ')[0];
                    let sep = raw.includes('/') ? '/' : raw.includes('-') ? '-' : null;
                    if (!sep) return null;
                    let parts = raw.split(sep);
                    if (parts.length !== 3) return null;
                    let [a, b, c] = parts;
                    let year, month, day;
                    if (a.length === 4) { // YYYY-MM-DD o YYYY/MM/DD
                        year = a; month = b; day = c;
                    } else if (c.length === 4) { // D/M/YYYY o DD-MM-YYYY
                        year = c; month = b; day = a;
                    } else {
                        return null;
                    }
                    let result = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    // Verificar que sea una fecha válida
                    if (isNaN(new Date(result).getTime())) return null;
                    return result;
                };

                const events = rows.map((s, idx) => {
                    if (!s.fecha || !s.hora) return null;
                    if (String(s.estado).toLowerCase() === 'cancelado') return null;

                    let dateStr = fixDate(s.fecha);
                    if (!dateStr) return null;

                    let timeStr = fixTime(s.hora);
                    const color = String(s.planta).includes('Barracas') ? '#004f89' : '#006e2d';

                    // Asegurarnos de que el string final sea ISO puro
                    let startStr = `${dateStr}T${timeStr}:00`;
                    let endStr = `${dateStr}T${String(parseInt(timeStr.split(':')[0]) + 1).padStart(2,'0')}:${timeStr.split(':')[1]}:00`;

                    // Si incluso después de todo StartStr no genera una fecha válida en Javascript, lo omitimos antes de mandarlo al calendario
                    if (isNaN(new Date(startStr).getTime())) return null;

                    return {
                        id: s.id || idx,
                        title: `OC: ${s.oc} - ${s.nombre_proveedor || s.ombre_proveed || 'S/N'}`,
                        start: startStr,
                        end: endStr,
                        backgroundColor: color,
                        borderColor: color,
                        extendedProps: {
                            supplier: s.nombre_proveedor || s.ombre_proveed || 'S/D',
                            planta: s.planta,
                            oc: s.oc,
                            articulo: s.articulo,
                            pallets: s.pallets
                        }
                    };
                }).filter(e => e !== null);

                calendar.addEventSource(events);

                if (events.length > 0) {
                    events.sort((a,b) => new Date(a.start) - new Date(b.start));
                    calendar.gotoDate(events[0].start);
                }

                document.getElementById('plantaFilter').onchange = (e) => {
                    const val = e.target.value;
                    calendar.getEvents().forEach(ev => {
                        if (val === 'all' || ev.extendedProps.planta === val) ev.setProp('display', 'auto');
                        else ev.setProp('display', 'none');
                    });
                };

            } catch (e) {
                console.error("Error técnico detallado:", e);
                alert("Error técnico: " + e.message + ". Revisa la consola (F12) para más detalles.");
            }
        }
        
        safeLoadShifts();
    });

</script>
</body>
</html>
