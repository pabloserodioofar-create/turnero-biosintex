<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Completar Perfil</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div class="flex items-center justify-center gap-2 mb-6">
        <span class="text-[#004f89] font-extrabold text-2xl tracking-tighter">Biosintex</span>
    </div>

    <div class="bg-amber-50 border border-amber-200 p-4 rounded-lg mb-6">
        <p class="text-sm text-amber-800">
            <span class="material-symbols-outlined text-amber-600 align-middle mr-1">info</span>
            Bienvenido. Completá tus datos de contacto para continuar.
        </p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-4 p-4 rounded bg-{{ 'green' if category=='success' else 'red' }}-100 text-{{ 'green' if category=='success' else 'red' }}-700 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h2 class="text-xl font-bold mb-6 text-center">Completar Datos de Contacto</h2>
    <form action="{{ url_for('complete_profile') }}" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Email de Contacto</label>
            <input type="email" name="email" required placeholder="email@ejemplo.com" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#004f89] focus:ring focus:ring-[#004f89] focus:ring-opacity-50">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Teléfono de Contacto</label>
            <input type="tel" name="phone" required placeholder="Ej. 11 1234-5678" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-[#004f89] focus:ring focus:ring-[#004f89] focus:ring-opacity-50">
        </div>
        <button type="submit" class="w-full py-3 px-4 bg-[#004f89] text-white rounded-md hover:bg-blue-800 transition font-bold">Guardar y Continuar</button>
    </form>

</div>

</body>
</html>
