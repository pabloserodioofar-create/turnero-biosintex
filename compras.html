
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Biosintex | Compras y Planificación</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff;}
        h1, h2, h3 { font-family: 'Manrope', sans-serif; color: #004f89; }
        .fc-event { cursor: default; border: none !important; padding: 2px 4px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] antialiased">

<header class="fixed top-0 w-full z-50 bg-white flex justify-between items-center px-6 h-16 shadow-sm border-b">
    <div class="flex items-center gap-2">
        <span class="text-[#004f89] font-extrabold text-xl tracking-tighter">Biosintex Compras</span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-sm font-bold text-gray-400 uppercase tracking-widest" id="user-display">Sector Compras</span>
        <a href="#" onclick="logout(); return false;" class="text-red-600 font-bold hover:underline text-xs bg-red-50 px-3 py-1.5 rounded-lg border border-red-100 transition">Cerrar Sesión</a>
    </div>
</header>

<main class="pt-24 pb-12 px-4 md:px-12 min-h-screen">
    <div class="max-w-7xl mx-auto space-y-8">
        <!-- SECCIÓN CARGA ERP -->
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h1 class="text-2xl font-black text-[#0b1c30] tracking-tight">Actualizar Maestro de O.C.</h1>
                    <p class="text-gray-500 text-sm mt-1">Subí el reporte del ERP (.xlsx o .csv) para actualizar las órdenes pendientes.</p>
                </div>
                <div class="relative group">
                    <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-[#004f89] text-white px-8 py-4 rounded-2xl font-black hover:bg-blue-900 transition-all shadow-lg flex items-center gap-3">
                        <span class="material-symbols-outlined">upload_file</span>
                        CARGAR ARCHIVO ERP
                    </button>
                    <p id="file-name" class="text-[10px] text-gray-400 mt-2 text-center font-bold"></p>
                </div>
            </div>
            
            <div id="loading" class="hidden mt-6 text-center py-10 bg-blue-50 rounded-2xl border border-dashed border-blue-200">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-[#004f89] border-t-transparent rounded-full mb-3"></div>
                <p class="text-sm font-bold text-[#004f89]">Procesando y sincronizando datos...</p>
            </div>
        </div>

        <!-- SECCIÓN CALENDARIO LECTURA -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">
            <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-black text-gray-700 uppercase tracking-tighter">Cronograma de Recepciones (Solo Lectura)</h2>
                <div class="flex gap-4">
                    <div class="flex items-center gap-2 text-[10px] font-bold text-gray-400">
                        <span class="w-2 h-2 rounded-full bg-[#004f89]"></span> BARRACAS
                        <span class="w-2 h-2 rounded-full bg-[#006e2d] ml-2"></span> PIBERA
                    </div>
                </div>
            </div>
            <div id='calendar' class="p-2"></div>
        </div>
    </div>
</main>

<script>
    const sessionStr = localStorage.getItem('biosintex_session');
    if (!sessionStr) window.location.href = 'login.html';
    const currentUser = JSON.parse(sessionStr);

    function logout() { localStorage.removeItem('biosintex_session'); window.location.href = 'login.html'; }

    var calendar;

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'timeGridWeek', locale: 'es', slotMinTime: '07:00:00', slotMaxTime: '14:00:00',
            hiddenDays: [0, 6], allDaySlot: false,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,dayGridMonth' }
        });
        calendar.render();
        loadData();

        document.getElementById('fileInput').addEventListener('change', handleFile);
    });

    async function loadData() {
        try {
            const res = await fetch(CONFIG.API_URL + "?action=get_all");
            const raw = await res.json();
            const db = {}; Object.keys(raw).forEach(k => { db[k.trim().toLowerCase()] = raw[k]; });

            const events = (db.turnos || []).filter(s => String(s.estado).toLowerCase().trim() !== 'cancelado').map(s => {
                const pCount = parseInt(s.pallets) || 1; const endHours = Math.ceil(pCount/5);
                const startStr = `${s.fecha}T${s.hora}:00`;
                let endDate = new Date(startStr); endDate.setHours(endDate.getHours() + endHours);
                const pad = (n) => String(n).padStart(2,'0');
                const endStr = `${endDate.getFullYear()}-${pad(endDate.getMonth()+1)}-${pad(endDate.getDate())}T${pad(endDate.getHours())}:${pad(endDate.getMinutes())}:00`;
                return { 
                    title: `OC: ${s.oc} | ${s.nombre_proveedor}`, 
                    start: startStr, end: endStr, 
                    backgroundColor: String(s.planta).includes('Barracas') ? '#004f89' : '#006e2d', 
                    borderColor: 'transparent'
                };
            });
            calendar.removeAllEventSources();
            calendar.addEventSource(events);
        } catch(e) { console.error(e); }
    }

    function handleFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-name').innerText = file.name;
        const reader = new FileReader();
        reader.onload = (evt) => {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = XLSX.utils.sheet_to_json(ws);
            processData(data);
        };
        reader.readAsBinaryString(file);
    }

    const normalize = (s) => String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

    async function processData(data) {
        if(data.length === 0) return alert("Archivo vacío.");
        const rawHeaders = Object.keys(data[0]);
        const foundHeaders = rawHeaders.map(normalize);
        const required = ["Orden de Compra", "Nombre_1", "Lugar Recepción", "Cantidad Pendiente de Entrega"];
        
        // Función de normalización extra para comparación (quita espacios y acentos)
        const ultraNormalize = (s) => normalize(s).replace(/\s+/g, '');
        const foundUltra = foundHeaders.map(h => h.replace(/\s+/g, ''));
        
        const missing = required.filter(h => !foundUltra.includes(ultraNormalize(h)));

        if(missing.length > 0) return alert("Faltan columnas críticas en el archivo: " + missing.join(", ") + "\n\nPor favor, verificá los nombres de las columnas.");

        document.getElementById('loading').classList.remove('hidden');
        try {
            console.log("Iniciando envío a Google...", data.length, "filas");
            const response = await fetch(CONFIG.API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'update_maestro', data: data }) 
            });
            
            const result = await response.json();
            console.log("Respuesta de Google:", result);
            
            if (result.success) {
                let msg = "¡Maestro de O.C. actualizado con éxito!\n";
                if (result.archivo_actualizado) msg += "\nArchivo: " + result.archivo_actualizado;
                if (result.filas_procesadas) msg += "\nFilas: " + result.filas_procesadas;
                alert(msg);
                location.reload();
            } else {
                alert("Error de Google: " + (result.error || "Fallo desconocido al guardar los datos. Verificá los permisos del script."));
            }
        } catch(e) {
            console.error("Error en fetch:", e);
            alert("Error de conexión: No se pudo contactar con Google Apps Script. Verificá tu conexión o la URL en config.js.");
        } finally {
            document.getElementById('loading').classList.add('hidden');
        }
    }
</script>
</body>
</html>
